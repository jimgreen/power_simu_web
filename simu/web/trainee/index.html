<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>极地微电网学员台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell" data-default-page="overview">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>极地微电网学员台</h1>
            <p><span id="connectionDot"></span><span id="connectionText">连接中</span></p>
          </div>
        </div>

        <div class="model-toolbar">
          <label class="model-switcher">显示模型
            <select id="modelSelector">
              <option value="">默认模型</option>
            </select>
            <span id="activeModelName">默认模型</span>
          </label>
        </div>

        <div class="clock-strip">
          <div class="clock-readout">
            <span id="simState">stopped</span>
            <strong id="simTime">00:00:00</strong>
            <small id="simSpeed">x1</small>
          </div>
          <button id="sendCommands" class="primary" type="button">发送指令</button>
        </div>
      </header>

      <nav class="page-nav" aria-label="学员台主题导航">
        <button data-nav-page="overview" class="is-active">主页</button>
        <button data-nav-page="measurements">实时量测</button>
        <button data-nav-page="controls">设备投退</button>
        <button data-nav-page="commands">控制指令</button>
        <button data-nav-page="history">指令记录</button>
      </nav>

      <main class="page-main">
        <section class="page-section is-active" data-page="overview">
          <div class="overview-grid">
            <section class="panel">
              <div class="panel-head">
                <h2>运行总览</h2>
                <span id="overviewRefresh">--</span>
              </div>
              <dl class="metric-grid">
                <div><dt>量测</dt><dd id="measureCount">0</dd></div>
                <div><dt>可用</dt><dd id="validCount">0</dd></div>
                <div><dt>待发</dt><dd id="pendingCount">0</dd></div>
                <div><dt>状态</dt><dd id="commandState">待命</dd></div>
              </dl>
            </section>

            <section class="panel overview-wide">
              <div class="panel-head">
                <h2>交直流混联系统</h2>
                <span id="topologyState">在线</span>
              </div>
              <svg class="one-line" viewBox="0 0 900 260" role="img" aria-label="交直流微电网单线图">
                <path class="bus ac" d="M70 90H440"></path>
                <path class="bus dc" d="M520 90H830"></path>
                <path class="link" d="M440 90 C470 70,490 70,520 90"></path>
                <g class="node online" transform="translate(95 90)"><circle r="18"></circle><text y="46">柴发</text></g>
                <g class="node online" transform="translate(225 90)"><circle r="18"></circle><text y="46">负荷</text></g>
                <g class="node online" transform="translate(355 90)"><circle r="18"></circle><text y="46">AC母线</text></g>
                <g class="node online" transform="translate(580 90)"><rect x="-20" y="-20" width="40" height="40"></rect><text y="50">DCAC</text></g>
                <g class="node online" transform="translate(700 90)"><rect x="-20" y="-20" width="40" height="40"></rect><text y="50">储能</text></g>
                <g class="node warn" transform="translate(800 90)"><rect x="-20" y="-20" width="40" height="40"></rect><text y="50">风光</text></g>
                <path class="drop" d="M225 108V190H355"></path>
                <path class="drop" d="M700 110V190H800"></path>
                <text class="caption" x="70" y="40">AC侧</text>
                <text class="caption" x="520" y="40">DC侧</text>
              </svg>
            </section>

            <section class="panel">
              <div class="panel-head">
                <h2>待发指令</h2>
                <span id="pendingSummary">0 项</span>
              </div>
              <div id="pendingPreview" class="log-list"></div>
            </section>
          </div>
        </section>

        <section class="page-section" data-page="measurements">
          <div class="measurement-page-layout">
            <aside class="panel measurement-tree-panel">
              <div class="panel-head">
                <h2>设备树</h2>
                <span id="measurementTreeSummary">0 类 · 0 台</span>
              </div>
              <div id="measurementDeviceTree" class="device-tree" aria-label="量测设备树"></div>
            </aside>

            <div class="measurement-workspace">
              <section class="panel measurement-table-panel">
                <div class="panel-head">
                  <h2>量测值</h2>
                  <span id="measurementValidCount">0 可用</span>
                </div>
                <div id="measurementTable" class="measurement-compare-wrap"></div>
              </section>

              <section class="panel measurement-trace-panel">
                <div class="panel-head">
                  <h2>测点跟踪曲线</h2>
                  <label class="compact-field">窗口
                    <select id="measurementTraceWindow">
                      <option value="15">15分钟</option>
                      <option value="60" selected>1小时</option>
                      <option value="120">2小时</option>
                      <option value="360">6小时</option>
                      <option value="1440">24小时</option>
                    </select>
                  </label>
                </div>
                <canvas id="measurementTraceChart" width="1500" height="360"></canvas>
                <div class="measurement-trace-legend">
                  <span><i class="trace-scada"></i>量测值</span>
                  <strong id="measurementTraceSummary">未选择测点</strong>
                </div>
              </section>
            </div>
          </div>
        </section>

        <section class="page-section" data-page="controls">
          <div class="runtime-page-layout">
            <aside class="panel runtime-tree-panel">
              <div class="panel-head">
                <h2>设备树</h2>
                <span id="runTreeSummary">0 类 · 0 台</span>
              </div>
              <div id="runDeviceTree" class="device-tree" aria-label="投退设备树"></div>
            </aside>

            <section class="panel runtime-table-panel">
              <div class="panel-head">
                <h2>设备投退</h2>
                <span id="runPendingCount">0 待发</span>
              </div>
              <div id="runControlTable" class="runtime-device-wrap"></div>
            </section>
          </div>
        </section>

        <section class="page-section" data-page="commands">
          <div class="runtime-page-layout">
            <aside class="panel runtime-tree-panel">
              <div class="panel-head">
                <h2>设备树</h2>
                <span id="setpointTreeSummary">0 类 · 0 台</span>
              </div>
              <div id="setpointDeviceTree" class="device-tree" aria-label="控制指令设备树"></div>
            </aside>

            <section class="panel runtime-table-panel">
              <div class="panel-head">
                <h2>控制指令</h2>
                <span id="setpointPendingCount">0 待发</span>
              </div>
              <div id="setpointControlTable" class="runtime-device-wrap"></div>
            </section>
          </div>
        </section>

        <section class="page-section" data-page="history">
          <section class="panel history-panel">
            <div class="panel-head">
              <h2>指令记录</h2>
              <span id="historyCount">0</span>
            </div>
            <div id="commandHistory" class="runtime-log-wrap"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
